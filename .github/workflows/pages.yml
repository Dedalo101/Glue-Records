name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble published site (EmailsForms only)
        run: |
          mkdir -p _publish/EmailsForms
          cp CNAME .nojekyll _publish/
          cp -r EmailsForms/. _publish/EmailsForms/
          cp publish-index.html _publish/index.html
          cp publish-404.html _publish/404.html
          cp robots.txt sitemap.xml _publish/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _publish

      - id: deployment
        uses: actions/deploy-pages@v4