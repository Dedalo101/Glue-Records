<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GLUE RECORDS</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#050505">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #050505;
    }

    .splash-link {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      cursor: pointer;
      text-decoration: none;
    }

    .full-screen-image {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      object-fit: cover;
      display: block;
    }

    .tap-hint {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      pointer-events: none;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <a class="splash-link" href="index.html" aria-label="Register for GLUE RECORDS secret event">
    <img
      class="full-screen-image"
      src="glue-records-bg.jpg"
      alt="GLUE RECORDS — tap to register"
      width="1200"
      height="1200"
    >
  </a>
  <p class="tap-hint">Tap anywhere to register</p>
</body>
</html>
