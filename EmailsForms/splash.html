  <script>
    (function () {
      var VIDEO_ID = 'JhQMeBecAWI';
      var player;
      var unmuted = false;

      function enableSound() {
        if (!player || unmuted || typeof player.unMute !== 'function') return;
        unmuted = true;
        player.unMute();
        player.setVolume(100);
      }

      document.addEventListener('pointerdown', enableSound, { once: true });

      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);

      window.onYouTubeIframeAPIReady = function () {
        player = new YT.Player('yt-player', {
          height: '1',
          width: '1',
          videoId: VIDEO_ID,
          playerVars: {
            autoplay: 1,
            loop: 1,
            playlist: VIDEO_ID,
            controls: 0,
            disablekb: 1,
            fs: 0,
            modestbranding: 1,
            playsinline: 1,
            rel: 0,
            origin: window.location.origin
          },
          events: {
            onReady: function (event) {
              var canPlayWithSound = navigator.userActivation
                && (navigator.userActivation.isActive || navigator.userActivation.hasBeenActive);

              if (!canPlayWithSound) event.target.mute();
              event.target.playVideo();
              if (canPlayWithSound) enableSound();
            }
          }
        });
      };
    })();
  </script>
